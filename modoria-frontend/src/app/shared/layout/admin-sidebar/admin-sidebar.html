<aside class="w-64 h-full border-r border-border bg-surface flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-border">
        <h2 class="font-heading font-bold text-lg text-primary tracking-tight">Modoria Admin</h2>
    </div>

    <div class="flex-1 overflow-y-auto py-4 px-3 flex flex-col gap-1">
        @for (item of navItems; track item.path) {
        <a [routerLink]="item.path" routerLinkActive="bg-primary/10 text-primary font-medium"
            class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-foreground-muted hover:text-foreground hover:bg-surface-elevated transition-colors">
            <!-- Using generic empty SVG box since lucide-angular components aren't globally bound here; can swap to generic icon mapping if desired -->
            <svg class="w-5 h-5 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
            {{ item.label }}
        </a>
        }
    </div>

    <div class="p-4 border-t border-border">
        <a routerLink="/"
            class="flex items-center gap-3 px-3 py-2.5 rounded-md text-sm text-foreground-muted hover:text-danger hover:bg-danger/10 transition-colors">
            <svg class="w-5 h-5 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4m7 14l5-5m0 0l-5-5m5 5H9"></path>
            </svg>
            Exit Admin
        </a>
    </div>
</aside>
