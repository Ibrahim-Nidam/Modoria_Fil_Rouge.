<div class="w-full overflow-x-auto rounded-lg border border-border">
    <table class="w-full text-sm text-left">
        <thead class="text-xs text-foreground-subtle uppercase bg-surface-elevated border-b border-border">
            <tr>
                @for (col of columns; track col.key) {
                <th scope="col" class="px-6 py-3 font-medium">{{ col.header }}</th>
                }
            </tr>
        </thead>
        <tbody>
            @if (loading) {
            <tr>
                <td [attr.colspan]="columns.length" class="px-6 py-8 text-center text-foreground-muted">
                    Loading...
                </td>
            </tr>
            } @else if (data.length === 0) {
            <tr>
                <td [attr.colspan]="columns.length" class="px-6 py-8 text-center text-foreground-muted">
                    {{ emptyMessage }}
                </td>
            </tr>
            } @else {
            @for (row of data; track $index) {
            <tr class="bg-surface border-b border-border hover:bg-surface-elevated/50 transition-colors">
                @for (col of columns; track col.key) {
                <td class="px-6 py-4 text-foreground">{{ row[col.key] }}</td>
                }
            </tr>
            }
            }
        </tbody>
    </table>
</div>
