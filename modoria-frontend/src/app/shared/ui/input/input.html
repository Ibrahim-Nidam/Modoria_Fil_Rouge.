<div class="flex flex-col gap-1.5 w-full">
    @if (label()) {
    <label class="text-sm font-medium text-foreground">{{ label() }}</label>
    }

    <!-- Wrapper acts as the visible input container -->
    <div class="flex items-center w-full rounded-lg border bg-surface transition-all duration-200 overflow-hidden"
        [class]="wrapperClasses">

        @if (icon()) {
        <!-- Icon zone: fixed width, visually separated from the text area -->
        <span class="flex items-center justify-center w-10 h-11 shrink-0 text-foreground-subtle border-r border-border">
            <span class="material-symbols-outlined text-[18px] leading-none select-none">{{ icon() }}</span>
        </span>
        }

        <!-- Actual input -->
        <input [type]="activeType" [placeholder]="placeholder()" [value]="value()" (input)="onInput($event)"
            (focus)="onFocus()" (blur)="onBlur()"
            class="flex-1 h-11 bg-transparent text-foreground placeholder:text-foreground-subtle text-sm outline-none px-3" />

        @if (type() === 'password') {
        <button type="button"
            class="flex items-center justify-center w-10 h-11 shrink-0 text-foreground-subtle hover:text-foreground transition-colors"
            (click)="togglePassword()">
            @if (showPassword()) {
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
            } @else {
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
            </svg>
            }
        </button>
        }
    </div>

    @if (errorMessage()) {
    <p class="text-xs text-danger flex items-center gap-1">
        <svg class="w-3 h-3 shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
        </svg>
        {{ errorMessage() }}
    </p>
    } @else if (hint()) {
    <p class="text-xs text-foreground-subtle">{{ hint() }}</p>
    }
</div>
