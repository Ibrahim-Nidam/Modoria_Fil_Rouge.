<div class="flex items-start gap-4 p-4 rounded-lg border shadow-lg max-w-sm w-full bg-surface"
    [class.border-success]="type === 'success'" [class.border-danger]="type === 'error'"
    [class.border-warning]="type === 'warning'" [class.border-info]="type === 'info'">

    <!-- Icon -->
    <div class="shrink-0 mt-0.5">
        @if (type === 'success') {
        <svg class="w-5 h-5 text-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
        </svg>
        } @else if (type === 'error') {
        <svg class="w-5 h-5 text-danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
            </path>
        </svg>
        } @else if (type === 'warning') {
        <svg class="w-5 h-5 text-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
            </path>
        </svg>
        } @else {
        <svg class="w-5 h-5 text-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        }
    </div>

    <!-- Content -->
    <div class="flex-1">
        @if (title) {
        <h3 class="text-sm font-semibold text-foreground">{{ title }}</h3>
        }
        <p class="text-sm text-foreground-muted mt-1">{{ message }}</p>
    </div>

    <!-- Close Button -->
    <button (click)="onClose()" class="shrink-0 text-foreground-muted hover:text-foreground">
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>
</div>
