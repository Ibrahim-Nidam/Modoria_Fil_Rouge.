@if (isOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-background/80 backdrop-blur-sm" (click)="onClose()"></div>

    <!-- Dialog -->
    <div
        class="relative z-10 w-full max-w-lg bg-surface border border-border rounded-xl shadow-lg m-4 overflow-hidden animate-in fade-in zoom-in-95 duration-200">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-border">
            <h2 class="text-lg font-heading font-semibold text-foreground">{{ title }}</h2>
            <button (click)="onClose()"
                class="p-1 rounded-md text-foreground-muted hover:text-foreground hover:bg-surface-elevated transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="px-6 py-4">
            <ng-content></ng-content>
        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-border bg-surface-elevated/50">
            <ng-content select="[modal-footer]"></ng-content>
        </div>
    </div>
</div>
}
