<div class="fp-wrapper">

    @if (success()) {
    <div class="success-state">
        <div class="success-icon">
            <svg class="w-8 h-8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />
            </svg>
        </div>
        <h2 class="auth-title">Check your email</h2>
        <p class="auth-subtitle">We've sent a password reset link to <strong>{{ form.value.email }}</strong></p>
        <a routerLink="/auth/login" class="back-link">Back to sign in</a>
    </div>
    } @else {
    <div class="auth-header">
        <h1 class="auth-title">Reset password</h1>
        <p class="auth-subtitle">Enter your email and we'll send a reset link</p>
    </div>

    @if (error()) {
    <div class="error-banner" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
        <ui-input label="Email address" type="email" placeholder="you@example.com" icon="mail" formControlName="email"
            [errorMessage]="getEmailError()" />
        <ui-button label="Send reset link" type="submit" variant="primary" size="lg" [fullWidth]="true"
            [loading]="loading()" />
    </form>

    <p class="auth-footer">
        Remembered?
        <a routerLink="/auth/login" class="auth-link">Sign in</a>
    </p>
    }

</div>
