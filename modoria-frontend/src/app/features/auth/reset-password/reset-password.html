<div class="rp-wrapper">
    @if (success()) {
    <div class="success-state">
        <div class="success-icon">✓</div>
        <h2 class="auth-title">Password updated!</h2>
        <p class="auth-subtitle">Redirecting you to login...</p>
    </div>
    } @else {
    <div class="auth-header">
        <h1 class="auth-title">New password</h1>
        <p class="auth-subtitle">Choose a strong password for your account</p>
    </div>

    @if (error()) {
    <div class="error-banner" role="alert">{{ error() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
        <ui-input label="New password" type="password" placeholder="At least 8 characters" icon="lock"
            formControlName="newPassword" [errorMessage]="getError('newPassword')" />
        <ui-input label="Confirm password" type="password" placeholder="Repeat your new password" icon="lock"
            formControlName="confirmPassword" [errorMessage]="getError('confirmPassword')" />
        <ui-button label="Set new password" type="submit" variant="primary" size="lg" [fullWidth]="true"
            [loading]="loading()" />
    </form>

    <p class="auth-footer">
        <a routerLink="/auth/login" class="auth-link">Back to sign in</a>
    </p>
    }
</div>
